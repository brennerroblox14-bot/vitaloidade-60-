<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Método Vitalidade 60+ | Recupere sua Energia e Disposição</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #FDF8F2;
      --beige:    #F5EDE0;
      --green:    #6BAF7A;
      --green-d:  #4E8C5E;
      --green-l:  #EAF5EC;
      --blue:     #7AAFC9;
      --blue-l:   #E8F3FA;
      --rose:     #E8A598;
      --rose-l:   #FDF0ED;
      --brown:    #7A5C44;
      --text:     #3A2E26;
      --muted:    #7A6A5E;
      --white:    #FFFFFF;
      --gold:     #D4A847;
      --shadow:   rgba(60,40,20,.10);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--text);
      font-size: 18px;
      line-height: 1.7;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--green);
      color: #fff;
      text-align: center;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .3px;
    }
    .topbar span { color: #FFE88A; }

    /* ── NAV ── */
    nav {
      background: var(--white);
      box-shadow: 0 2px 12px var(--shadow);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--green-d);
    }
    .logo span { color: var(--rose); }
    .nav-cta {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .nav-cta:hover { background: var(--green-d); transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #FEF6EE 0%, #EAF5EC 60%, #E8F3FA 100%);
      padding: 60px 24px 50px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(107,175,122,.18) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-badge {
      display: inline-block;
      background: var(--rose-l);
      color: var(--rose);
      border: 2px solid var(--rose);
      border-radius: 50px;
      padding: 6px 20px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .5px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 6vw, 50px);
      font-weight: 900;
      line-height: 1.25;
      color: var(--text);
      max-width: 800px;
      margin: 0 auto 22px;
    }
    .hero h1 em {
      color: var(--green-d);
      font-style: normal;
    }
    .hero p.sub {
      font-size: clamp(17px, 3vw, 21px);
      color: var(--muted);
      max-width: 650px;
      margin: 0 auto 36px;
      line-height: 1.8;
    }
    .hero-illustration {
      width: 100%;
      max-width: 380px;
      height: 320px;
      border-radius: 24px;
      background: linear-gradient(145deg, #d4edda, #c8e6c9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 36px;
      box-shadow: 0 16px 48px rgba(107,175,122,.22);
      position: relative;
      overflow: hidden;
    }
    .hero-illustration svg { width: 85%; height: 85%; }

    .btn-hero {
      display: inline-block;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-d) 100%);
      color: #fff;
      border: none;
      border-radius: 60px;
      padding: 20px 40px;
      font-size: clamp(17px, 3.5vw, 22px);
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 28px rgba(78,140,94,.38);
      transition: transform .2s, box-shadow .2s;
      line-height: 1.3;
      max-width: 480px;
      width: 100%;
    }
    .btn-hero:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(78,140,94,.45); }
    .btn-sub { font-size: 13px; color: var(--muted); margin-top: 12px; }
    .hero-trust {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 36px;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
    }
    .trust-item svg { width: 22px; height: 22px; color: var(--green); }

    /* ── SECTION COMMON ── */
    section { padding: 64px 24px; }
    .section-inner { max-width: 860px; margin: 0 auto; }
    .section-label {
      display: inline-block;
      background: var(--green-l);
      color: var(--green-d);
      border-radius: 50px;
      padding: 5px 18px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
    }

    /* ── DOR ── */
    .dor { background: var(--beige); }
    .dor .section-title { color: var(--brown); }
    .dor-text {
      font-size: clamp(17px, 3vw, 20px);
      color: var(--text);
      line-height: 1.9;
      max-width: 700px;
      margin-bottom: 40px;
    }
    .dor-text strong { color: var(--green-d); }
    .pain-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }
